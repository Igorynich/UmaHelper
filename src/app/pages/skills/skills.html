<div class="skills-container">
  <div class="header-actions">
    <h2>Skills ({{ filteredSkills().length }})</h2>
    <mat-form-field appearance="outline" class="filter-field">
      <mat-label>Filter by name</mat-label>
      <input matInput [formControl]="filterControl">
      @if (filterControl.value) {
        <button matSuffix mat-icon-button aria-label="Clear" (click)="clearFilter()">
          <mat-icon>close</mat-icon>
        </button>
      }
    </mat-form-field>
  </div>
  <div class="skills-list">
    @for (skill of filteredSkills(); track skill.id) {
      <app-skill-display [skill]="skill"></app-skill-display>
    }
  </div>
</div>
