@if (savedDataResource.isLoading()) {
  <div class="loading-container">
    <mat-spinner diameter="80"></mat-spinner>
  </div>
} @else {
  <div class="page-container">
    <h2>Support Cards</h2>

    <div class="tab-container">
      <div ngpTabset class="tab-group" [(ngpTabsetValue)]="selectedTabValue">
        <div ngpTabList class="tab-list">
          <button ngpTabButton [ngpTabButtonValue]="'all-cards'" class="tab-button">All Cards</button>
          @for (tab of hydratedTabsData(); track $index) {
            <button ngpTabButton [ngpTabButtonValue]="getTabValueFromIndex($index)" class="tab-button">
              <div class="tab-label">
                <span>{{ tab.name }}</span>
                <button
                  mat-icon-button
                  class="close-tab-button"
                  (click)="removeTab($event, $index)"
                  matTooltip="Remove tab">
                  <mat-icon>close</mat-icon>
                </button>
              </div>
            </button>
          }
        </div>
        <div ngpTabPanel [ngpTabPanelValue]="'all-cards'" class="tab-content">
          <div class="bulk-actions-container">
            <div class="left-buttons">
              <button
                mat-button="outlined"
                color="primary"
                [matMenuTriggerFor]="addMenu"
                [disabled]="!hasSelectedCards()"
                matTooltip="Add selected cards to tab">
                <mat-icon>add</mat-icon>
                Add Selected
              </button>
            </div>
            <button mat-button="filled" (click)="saveData(true)">Save Data</button>
          </div>
          <app-support-card-list-view
            [cards]="allCardsWithDefaults()"
            (add)="onAddCard($event)"
            [isFirstTab]="true"
            [addMenu]="addMenu"
            [tabIndex]="ALL_CARDS_TAB_INDEX"
            [isActive]="selectedTabValue() === 'all-cards'"
            [pageIndex]="currentPage()"
            [pageSize]="currentPageSize()"
            (levelsChangedInFirstTab)="onSupportCardsWithLevelsChanged($event)"
            (pageChanged)="currentPage.set($event)"
            (pageSizeChanged)="currentPageSize.set($event)"
          >
          </app-support-card-list-view>
        </div>
        @for (tab of hydratedTabsData(); track $index) {
          <div ngpTabPanel [ngpTabPanelValue]="getTabValueFromIndex($index)" class="tab-content">
            <div class="bulk-actions-container">
              <div class="left-buttons">
                <button
                  mat-button="outlined"
                  [disabled]="!hasSelectedCards()"
                  [matMenuTriggerFor]="addMenu"
                  matTooltip="Add selected cards to tab">
                  <mat-icon>add</mat-icon>
                  Add Selected
                </button>
                <button
                  mat-button="outlined"
                  color="warn"
                  [disabled]="!hasSelectedCards()"
                  (click)="onBulkRemove($index)"
                  matTooltip="Remove selected cards from this tab">
                  <mat-icon>remove</mat-icon>
                  Remove Selected
                </button>
              </div>
              <button mat-button="filled" color="warn" (click)="saveData()">Save Data</button>
            </div>
            <app-support-card-list-view
              [cards]="tab.cards"
              [tabIndex]="$index"
              [isActive]="selectedTabValue() === getTabValueFromIndex($index)"
              [pageIndex]="currentPage()"
              [pageSize]="currentPageSize()"
              (levelChangedInTab)="onLevelChangedInDynamicTab($index, $event)"
              (add)="onAddCard($event)"
              (remove)="onRemoveCard($index, $event)"
              (filterChanged)="onFilterChanged($index, $event)"
              (levelsChangedInFirstTab)="onSupportCardsWithLevelsChanged($event)"
              (pageChanged)="currentPage.set($event)"
              (pageSizeChanged)="currentPageSize.set($event)"
              [addMenu]="addMenu">
            </app-support-card-list-view>
          </div>
        }
      </div>

      <button mat-icon-button (click)="addTab()" class="add-tab-button" matTooltip="Add new tab">
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>
}
<mat-menu #addMenu="matMenu">
  @for (tab of availableTabs(); track tab.value) {
    <button mat-menu-item (click)="addCardToTab(selectedCard(), tab.index)">{{ tab.name }}</button>
  }
</mat-menu>
